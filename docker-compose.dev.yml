# FALLBACK only. Per Constitution v2.10.0 (Tech Stack > Local development orchestration),
# the canonical local bring-up is `dotnet run --project src/AppHost`. This compose file
# exists for SDK-less environments (CI smoke jobs, air-gapped boxes, language-agnostic
# onboarding). When both exist they MUST stay in sync (image versions, ports, env vars).
# The AppHost is canonical; divergence is a review blocker.

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: ledger
      POSTGRES_USER: ledger
      POSTGRES_PASSWORD: ledger
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "ledger", "-d", "ledger"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  postgres_data:
